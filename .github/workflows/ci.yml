name: CI

# 跑不依赖外部 LLM 网关的离线验证（检索/扩池/飞轮/类型检查）。
# 真调 AI 的端到端（选择层）需要 LLM key，不在 CI 跑。
#
# 路径过滤：用 dorny/paths-filter 做 per-job 粒度（GitHub 原生 on.paths 只能 workflow 级）。
# platform 改 → 只跑 platform 相关 job；client 改 → 只跑 client job。省 Actions 额度。
# ci.yml 自身改 或 手动 workflow_dispatch → 全跑（保险）。

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  changes:
    name: 检测改动路径
    runs-on: ubuntu-latest
    outputs:
      platform: ${{ steps.filter.outputs.platform }}
      client: ${{ steps.filter.outputs.client }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            platform:
              - 'platform/**'
              - '.github/workflows/ci.yml'
            client:
              - 'client/**'
              - '.github/workflows/ci.yml'
            contracts:
              - 'platform/**'
              - 'fixtures/**'
              - '.github/workflows/ci.yml'

  platform-offline-evals:
    name: Platform 离线评测（检索/扩池/飞轮）
    needs: changes
    if: ${{ needs.changes.outputs.platform == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.12
      - name: Sync deps
        run: uv sync
      - name: 检索召回率（M3）
        run: uv run python eval_retrieval.py
      - name: WRITE_OWN 退化率（M4）
        run: uv run python eval_writeown.py
      - name: 飞轮健康度闭环（M5）
        run: uv run python eval_flywheel.py

  client-typecheck:
    name: Client 类型检查
    needs: changes
    if: ${{ needs.changes.outputs.client == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: client/pnpm-lock.yaml
      - name: Install deps
        # --ignore-scripts：跳过 esbuild 等 build script（typecheck 不需要它们，
        # 且 pnpm9 默认拒绝未批准 build 会让 install 非零退出 ERR_PNPM_IGNORED_BUILDS）
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: tsc --noEmit
        run: node node_modules/typescript/bin/tsc --noEmit

  contracts-parity:
    name: 跨语言契约对拍（Pydantic ↔ zod）
    needs: changes
    if: ${{ needs.changes.outputs.contracts == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Python 侧 parse fixture
        working-directory: platform
        run: |
          uv sync
          uv run python -c "import json,loom_contracts as c; c.AssemblyPlan.model_validate(json.load(open('../fixtures/assembly-plan.sample.json')))" && echo "Pydantic parse OK"
